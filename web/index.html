<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pathfinder</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Pathfinder</h1>
    <p id="status" class="status">connecting…</p>
    <button id="shoot">Capture</button>
    <p id="result" class="result"></p>
    <section id="settings" class="settings"></section>

    <section id="network" class="network">
      <h2>Network</h2>
      <p id="net-status" class="status">checking…</p>
      <input id="net-ssid" type="text" placeholder="WiFi SSID" autocomplete="off">
      <input id="net-password" type="password" placeholder="WiFi password" autocomplete="off">
      <button id="net-join">Join this network</button>
      <button id="net-ap">Use Pathfinder AP</button>
      <p id="net-result" class="result"></p>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
