<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pathfinder</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <h1>Pathfinder</h1>
    <p id="status" class="status">connecting…</p>
    <div id="liveview" class="liveview offline">
      <img id="preview" alt="live preview">
    </div>
    <div id="telemetry" class="telemetry"></div>
    <div id="focus" class="focus">
      <button id="af" class="focus-af">AF</button>
      <div class="focus-drive">
        <button id="focusNear" class="focus-step" title="focus nearer" aria-label="focus nearer">◀</button>
        <select id="focusStep" aria-label="focus step size">
          <option value="1">Fine</option>
          <option value="3" selected>Med</option>
          <option value="6">Coarse</option>
        </select>
        <button id="focusFar" class="focus-step" title="focus farther" aria-label="focus farther">▶</button>
      </div>
    </div>
    <button id="shoot">Capture</button>
    <button id="record">Record</button>
    <p id="result" class="result"></p>
    <section id="settings" class="settings"></section>
  </main>
  <script src="script.js"></script>
</body>
</html>
